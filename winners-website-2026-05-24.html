<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winners — Medicina (v4b compact)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --teal:#0B8F6F;--teal-hover:#077A5E;--teal-light:#DFF2EB;--teal-faint:#F0FAF6;
  --ink:#0C0F0E;--ink-2:#3D4440;--ink-3:#7A8480;--ink-4:#B8C0BC;
  --paper:#FAFAFA;--white:#FFFFFF;--border:#E8EDEB;--border-strong:#C8D4CF;
  --r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:28px;
}
body{font-family:'Geist',system-ui,sans-serif;background:var(--paper);color:var(--ink);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;}

.btn-teal{display:inline-flex;align-items:center;gap:7px;background:var(--teal);color:#fff;font-size:13px;font-weight:500;padding:10px 22px;border-radius:999px;border:none;cursor:pointer;text-decoration:none;font-family:'Geist',system-ui,sans-serif;}
.btn-teal:hover{background:var(--teal-hover);}
/* LANG BAR */
.lang-bar{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;background:rgba(250,250,250,0.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:500;color:var(--ink);text-decoration:none;letter-spacing:-0.3px;}
.logo-mark{height:28px;display:flex;align-items:center;justify-content:center;}
.logo-mark img{height:28px;width:auto;}
.logo-sub{font-size:10px;background:var(--teal-light);color:var(--teal);padding:2px 7px;border-radius:99px;font-weight:500;}
.lang-btns{display:flex;gap:2px;align-items:center}
.lang-btn{padding:5px 10px;font-size:12px;font-weight:500;font-family:'Geist',sans-serif;border:1px solid transparent;border-radius:var(--r-sm);background:var(--teal-light);color:var(--teal);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px;}
.lang-btn:hover{background:#C8E8DE;color:var(--teal)}
.lang-btn.active{background:var(--teal);color:#fff;border-color:var(--teal);}
.lang-flag{font-size:13px}

/* MAIN */
main{padding-top:52px;min-height:100vh;}

/* HERO */
.hero{padding:36px 20px 0;max-width:680px;margin:0 auto;text-align:center;}
.hero-kicker{display:inline-block;font-family:'Fraunces',Georgia,serif;font-size:clamp(26px,6vw,52px);font-weight:300;font-style:italic;color:var(--ink);line-height:1.1;letter-spacing:-0.03em;margin-bottom:20px;}
.hero-kicker em{color:var(--teal);}


/* CHAT */
.chat-wrap{max-width:520px;margin:0 auto;padding:0 20px;}
.chat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;box-shadow:0 2px 24px rgba(0,0,0,0.06),0 1px 4px rgba(0,0,0,0.04);}
.chat-header{background:var(--teal);padding:14px 18px;display:flex;align-items:center;gap:11px;}
.chat-av{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:#fff;flex-shrink:0;position:relative;}
.chat-pulse{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:#4ADE80;border-radius:50%;border:2px solid var(--teal);}
.chat-hinfo{flex:1}
.chat-hname{font-size:14px;font-weight:500;color:#fff;letter-spacing:-0.1px}
.chat-hstatus{font-size:11px;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:4px;}
.chat-hstatus-dot{width:5px;height:5px;background:#4ADE80;border-radius:50%}

.chat-body{padding:14px}
.chat-bubble{background:var(--paper);border:1px solid var(--border);border-radius:3px 16px 16px 16px;padding:10px 14px;font-size:13px;line-height:1.55;color:var(--ink);margin-bottom:12px;max-width:92%;}
.chat-quick{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0;transition:margin 0.2s;}.chat-quick.answered{margin-bottom:14px;}
.chat-qbtn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:99px;border:1.5px solid var(--teal);background:var(--white);color:var(--teal);font-size:12.5px;font-weight:500;font-family:'Geist',sans-serif;cursor:pointer;transition:all 0.15s;}
.chat-qbtn:hover{background:var(--teal-faint)}
.chat-qbtn svg{width:13px;height:13px;flex-shrink:0}
.chat-input-row{display:none;}.chat-input-row.visible{display:flex;}
.chat-input-row:focus-within{border-color:var(--teal)}
.chat-input{flex:1;border:none;background:transparent;font-size:13px;color:var(--ink);font-family:'Geist',sans-serif;outline:none;}
.chat-input::placeholder{color:var(--ink-4)}
.chat-send-btn{width:32px;height:32px;background:var(--teal);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s,transform 0.1s;}
.chat-send-btn:hover{background:var(--teal-hover);transform:scale(1.05)}
.chat-send-btn svg{width:13px;height:13px}
.chat-privacy{display:none;}.chat-privacy.visible{display:flex;}

/* OUTCOMES */







/* DIVIDER */
.divider{border:none;border-top:1px solid var(--border);margin:0;}

/* SECTIONS */
.section{padding:56px 20px}
.section.alt{background:var(--white)}
.section-inner{max-width:600px;margin:0 auto}
.section-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:10px;}
.section-title{font-family:'Fraunces',Georgia,serif;font-size:clamp(24px,4vw,32px);font-weight:300;font-style:italic;line-height:1.2;letter-spacing:-0.02em;color:var(--ink);margin-bottom:28px;}
.section-title strong{font-weight:400;font-style:normal}

/* PRIVATE CONTEXT */
.context-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.context-grid{grid-template-columns:1fr}.context-full{grid-column:1!important}}
.context-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;}
.context-card.accent{background:var(--teal-faint);border-color:rgba(11,143,111,0.2);}
.context-icon{width:32px;height:32px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:16px;}
.context-icon.green{background:var(--teal-light)}
.context-card-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:6px;line-height:1.3;}
.context-card-body{font-size:12px;color:var(--ink-3);line-height:1.55;}

/* HOW */
.how-step{display:flex;gap:16px;padding:20px 0;border-bottom:1px solid var(--border);}
.how-step:last-child{border-bottom:none}
.how-num{font-family:'Fraunces',serif;font-size:36px;font-weight:300;font-style:italic;color:var(--teal-light);line-height:1;width:44px;flex-shrink:0;padding-top:2px;}
.how-title{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:4px}
.how-body{font-size:13px;color:var(--ink-3);line-height:1.55}
.how-tag{display:inline-block;margin-top:8px;font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;background:var(--teal-light);color:var(--teal);padding:3px 8px;border-radius:99px;}

/* JULIAN */
.julian-wrap{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:start;}
@media(max-width:460px){.julian-wrap{grid-template-columns:1fr;text-align:center}.julian-av-wrap{margin:0 auto}.julian-quote{border-left:none;border-top:2px solid var(--teal);padding-left:0;padding-top:12px}}
.julian-av-wrap{position:relative;width:fit-content}
.julian-av{width:80px;height:80px;border-radius:50%;background:var(--teal-light);border:2px solid var(--teal);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:400;color:var(--teal);font-family:'Fraunces',serif;font-style:italic;}
.julian-founder{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);background:var(--teal);color:#fff;font-size:9px;font-weight:600;padding:3px 8px;border-radius:99px;white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase;}
.julian-name{font-size:18px;font-weight:500;color:var(--ink);margin-bottom:2px;letter-spacing:-0.2px}
.julian-role{font-size:12px;color:var(--ink-3);margin-bottom:14px}
.julian-quote{font-family:'Fraunces',serif;font-size:16px;font-style:italic;font-weight:300;color:var(--ink);line-height:1.6;border-left:2px solid var(--teal);padding-left:14px;margin-bottom:16px;}
.julian-creds{display:flex;flex-direction:column;gap:5px}
.julian-cred{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-3);}
.julian-cred-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);flex-shrink:0}

/* PROOF */
.proof-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.proof-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px 16px;text-align:center;}
.proof-n{font-family:'Fraunces',serif;font-size:38px;font-weight:300;font-style:italic;color:var(--teal);line-height:1;margin-bottom:6px;}
.proof-l{font-size:11px;color:var(--ink-3);line-height:1.4}

/* TESTIMONIALS */
.testi-stack{display:flex;flex-direction:column;gap:10px}
.testi{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;}
.testi.feat{border-color:var(--teal)}
.testi-top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.testi-flag{font-size:20px}
.testi-name{font-size:13px;font-weight:500;color:var(--ink)}
.testi-from{font-size:11px;color:var(--ink-3)}
.testi-q{font-family:'Fraunces',serif;font-size:14px;font-style:italic;font-weight:300;color:var(--ink-2);line-height:1.6;margin-bottom:12px;}
.testi-result{display:flex;align-items:center;gap:7px;background:var(--teal-faint);border-radius:var(--r-sm);padding:8px 10px;font-size:12px;font-weight:500;color:var(--teal);}
.testi-tick{width:16px;height:16px;background:var(--teal);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* FAQ */
.faq-list{max-width:560px;margin:0 auto}
details.faq{border-bottom:1px solid var(--border);padding:16px 0;}
details.faq:first-of-type{border-top:1px solid var(--border)}
summary.faq-q{display:flex;align-items:center;justify-content:space-between;gap:14px;font-size:14px;font-weight:500;color:var(--ink);cursor:pointer;list-style:none;user-select:none;}
summary.faq-q::-webkit-details-marker{display:none}
.faq-plus{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--teal);flex-shrink:0;transition:transform 0.2s;}
details[open] .faq-plus{transform:rotate(45deg)}
.faq-a{font-size:13px;color:var(--ink-3);line-height:1.65;padding-top:10px;}

/* FINAL */
.final{background:var(--teal-faint);padding:64px 20px;text-align:center;}
.final-inner{max-width:480px;margin:0 auto}
.final-title{font-family:'Fraunces',serif;font-size:28px;font-weight:300;font-style:italic;color:var(--ink);line-height:1.2;letter-spacing:-0.02em;margin-bottom:20px;}
.final-sub{font-size:14px;color:var(--ink-3);margin-bottom:28px;font-weight:300;}
.final-cta{display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#fff;font-size:14px;font-weight:500;font-family:'Geist',sans-serif;padding:13px 28px;border-radius:99px;border:none;cursor:pointer;text-decoration:none;transition:background 0.15s,transform 0.15s;margin-bottom:14px;}
.final-cta:hover{background:var(--teal-hover);transform:translateY(-1px)}
.final-meta{display:none;align-items:center;justify-content:center;flex-wrap:wrap;gap:14px;font-size:11px;color:rgba(255,255,255,0.35);}
.final-meta span{display:flex;align-items:center;gap:4px}

/* FOOTER */
footer{padding:20px;text-align:center;border-top:1px solid var(--border);font-size:11px;color:var(--ink-4);}
footer a{color:var(--ink-3);text-decoration:none}


/* RANKING PREVIEW */

.uni-logo{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;letter-spacing:0.02em;}
.uni-logo-nav{background:#003A70;color:#fff;font-size:7px;}
.uni-logo-uic{background:#C8102E;color:#fff;}
.uni-logo-ceu{background:#0057A8;color:#fff;}

.ranking-preview{max-width:380px;margin:0 auto 16px;padding:0 20px;}
.ranking-preview-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4);text-align:center;margin-bottom:10px;font-weight:500;}
.ranking-rows{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm);}
.ranking-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);gap:8px;}
.ranking-row:last-child{border-bottom:none;}
.ranking-row-left{display:flex;align-items:center;gap:10px;}

.ranking-uni-name{font-size:12px;font-weight:500;color:var(--ink);line-height:1.3;}
.ranking-uni-city{font-size:11px;color:var(--ink-4);}
.badge-likely{background:#E0F5EE;color:#077A5E;font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;white-space:nowrap;}
.badge-achievable{background:#FEF3C7;color:#92400E;font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;white-space:nowrap;}
.badge-ambitious{background:#EEF2FF;color:#3730A3;font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;white-space:nowrap;}
.ranking-preview-note{display:none;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.hero>*{animation:fadeUp 0.45s ease both}
.hero>*:nth-child(1){animation-delay:0.05s}
.hero>*:nth-child(2){animation-delay:0.12s}
.chat-wrap{animation:fadeUp 0.45s 0.18s ease both}
.outcomes{animation:fadeUp 0.45s 0.26s ease both}
</style>
</head>

function expandChat(btn, choice) {
  // Style the chosen button as selected
  document.querySelectorAll('.chat-qbtn').forEach(b => {
    b.style.opacity = '0.4';
    b.style.pointerEvents = 'none';
  });
  btn.style.opacity = '1';
  btn.style.background = 'var(--teal)';
  btn.style.color = '#fff';
  btn.style.borderColor = 'var(--teal)';

  // Add spacing and show input
  document.querySelector('.chat-quick').classList.add('answered');
  document.querySelector('.chat-input-row').classList.add('visible');
  document.querySelector('.chat-privacy').classList.add('visible');

  // Focus the input and scroll to it smoothly
  setTimeout(() => {
    const input = document.querySelector('.chat-input');
    input.focus();
    input.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 150);
}

function toggleGradeDD(){
  const menu = document.getElementById('gradeMenu');
  const chevron = document.getElementById('gradeChevron');
  const open = menu.style.display === 'block';
  menu.style.display = open ? 'none' : 'block';
  chevron.style.transform = open ? '' : 'rotate(180deg)';
  document.getElementById('langMenu').style.display = 'none';
  document.getElementById('langChevron').style.transform = '';
}
document.addEventListener('click', function(e){
  if(!e.target.closest('#gradeDropdown')){
    const m = document.getElementById('gradeMenu');
    if(m) m.style.display = 'none';
    const c = document.getElementById('gradeChevron');
    if(c) c.style.transform = '';
  }
});
function toggleLangDD(){
  const menu = document.getElementById('langMenu');
  const chevron = document.getElementById('langChevron');
  const open = menu.style.display === 'block';
  menu.style.display = open ? 'none' : 'block';
  chevron.style.transform = open ? '' : 'rotate(180deg)';
}
function selectLang(lang, flag, code){
  setLang(lang);
  document.getElementById('langFlag').textContent = flag;
  document.getElementById('langCode').textContent = code;
  document.getElementById('langMenu').style.display = 'none';
  document.getElementById('langChevron').style.transform = '';
  ['Es','Fr','En'].forEach(l => document.getElementById('check'+l).style.display = 'none');
  document.getElementById('check'+code.charAt(0)+code.charAt(1).toLowerCase()).style.display = 'inline';
}
document.addEventListener('click', function(e){
  if(!e.target.closest('#langDropdown')){
    const m = document.getElementById('langMenu');
    if(m) m.style.display = 'none';
    const c = document.getElementById('langChevron');
    if(c) c.style.transform = '';
  }
});
function setLang(lang){
  document.documentElement.lang=lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick')===`setLang('${lang}')`));
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(i18n[lang][k]!==undefined)el.innerHTML=i18n[lang][k];});
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{const k=el.getAttribute('data-i18n-placeholder');if(i18n[lang][k]!==undefined)el.placeholder=i18n[lang][k];});
  const titles={es:'Winners — Medicina en España',fr:'Winners — Médecine en Espagne',en:'Winners — Medicine in Spain'};
  document.title=titles[lang];
}
setLang('es');
